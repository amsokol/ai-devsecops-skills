name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Markdown lint
        run: npx --yes markdownlint-cli2 "**/*.md"

      - name: Markdown links
        run: python3 scripts/check_md_links.py
